openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BOC Study Notebook API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: openai
  - name: notebooks
  - name: notes
  - name: resources
  - name: flashcards
  - name: audio
  - name: studyguides
  - name: quizzes
  - name: mock
  - name: tutor
  - name: dashboard
  - name: plan
  - name: scraper
  - name: catalog
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- Catalog ----
  /domains:
    get:
      operationId: listDomains
      tags: [catalog]
      summary: List BOC domains with target weights
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Domain" }
  /topics:
    get:
      operationId: listTopics
      tags: [catalog]
      summary: List topics
      parameters:
        - { name: domainId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Topic" }

  # ---- Notebooks ----
  /notebooks:
    get:
      operationId: listNotebooks
      tags: [notebooks]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notebook" }
    post:
      operationId: createNotebook
      tags: [notebooks]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotebookInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notebook" }
  /notebooks/{id}:
    get:
      operationId: getNotebook
      tags: [notebooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotebookDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateNotebook
      tags: [notebooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotebookUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notebook" }
    delete:
      operationId: deleteNotebook
      tags: [notebooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---- Notes (sources) ----
  /notebooks/{id}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Note" }
    post:
      operationId: createNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
    delete:
      operationId: deleteNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---- Flashcards ----
  /notebooks/{id}/flashcards:
    get:
      operationId: listFlashcards
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }
    post:
      operationId: createFlashcard
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flashcard" }
  /notebooks/{id}/flashcards/generate:
    post:
      operationId: generateFlashcards
      tags: [flashcards]
      summary: AI-generate flashcards from notebook content
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardGenInput" }
      responses:
        "201":
          description: Generated
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }
  /flashcards/{id}:
    patch:
      operationId: updateFlashcard
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flashcard" }
    delete:
      operationId: deleteFlashcard
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /flashcards/{id}/review:
    post:
      operationId: reviewFlashcard
      tags: [flashcards]
      summary: Submit a spaced-repetition rating (0-5) and get next due
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardReviewInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flashcard" }
  /flashcards/due:
    get:
      operationId: listDueFlashcards
      tags: [flashcards]
      summary: All flashcards due today across notebooks
      parameters:
        - name: topicIds
          in: query
          required: false
          description: Comma-separated topic IDs to restrict due cards to (used by focused region review).
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }

  # ---- Study Guides / Summaries ----
  /notebooks/{id}/study-guides:
    get:
      operationId: listStudyGuides
      tags: [studyguides]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StudyGuide" }
    post:
      operationId: generateStudyGuide
      tags: [studyguides]
      summary: AI-generate a study guide from notebook material
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGuideInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGuide" }
  /study-guides/{id}:
    get:
      operationId: getStudyGuide
      tags: [studyguides]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGuide" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteStudyGuide
      tags: [studyguides]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---- Audio Overviews (TTS) ----
  /notebooks/{id}/audio-overviews:
    get:
      operationId: listAudioOverviews
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AudioOverview" }
    post:
      operationId: generateAudioOverview
      tags: [audio]
      summary: AI-generate a narrated audio overview of notebook material
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AudioOverviewInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioOverview" }
  /audio-overviews/{id}:
    get:
      operationId: getAudioOverview
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioOverview" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteAudioOverview
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /audio-overviews/{id}/audio:
    get:
      operationId: streamAudioOverview
      tags: [audio]
      summary: Stream audio file
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: MP3 audio
          content:
            audio/mpeg: {}

  # ---- Quizzes (adaptive practice) ----
  /quizzes:
    get:
      operationId: listQuizAttempts
      tags: [quizzes]
      summary: Recent practice quiz attempts
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuizSummary" }
    post:
      operationId: startQuiz
      tags: [quizzes]
      summary: Start a practice quiz session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuizInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }
  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /quizzes/{id}/answer:
    post:
      operationId: answerQuizQuestion
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuizAnswerInput" }
      responses:
        "200":
          description: OK with feedback
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizAnswerResult" }
  /quizzes/{id}/finish:
    post:
      operationId: finishQuiz
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }

  # ---- Mock exam ----
  /mock-exams:
    get:
      operationId: listMockExams
      tags: [mock]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MockExamSummary" }
    post:
      operationId: startMockExam
      tags: [mock]
      summary: Start a strict timed mock exam (BOC blueprint, no back-nav, auto-submit)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MockExamInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExam" }
  /mock-exams/{id}:
    get:
      operationId: getMockExam
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExam" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteMockExam
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /mock-exams/{id}/answer:
    post:
      operationId: answerMockExamQuestion
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MockExamAnswerInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExam" }
  /mock-exams/{id}/heartbeat:
    post:
      operationId: heartbeatMockExam
      tags: [mock]
      summary: Visibility/focus heartbeat for proctor-style logging
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MockExamHeartbeatInput" }
      responses:
        "204": { description: OK }
  /mock-exams/{id}/submit:
    post:
      operationId: submitMockExam
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExamResult" }

  # ---- AI Tutor (text streaming) ----
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OpenaiConversation" }
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenaiConversationInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpenaiConversation" }
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpenaiConversationWithMessages" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OpenaiMessage" }
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send tutor message; SSE stream of response chunks
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenaiMessageInput" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  # ---- Resources library ----
  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: Curated study resources (filtered by topic/domain)
      parameters:
        - { name: topicId, in: query, required: false, schema: { type: integer } }
        - { name: domainId, in: query, required: false, schema: { type: integer } }
        - { name: kind, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Resource" }
    post:
      operationId: createResource
      tags: [resources]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResourceInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Resource" }
  /resources/{id}:
    delete:
      operationId: deleteResource
      tags: [resources]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /resources/recommended:
    get:
      operationId: listRecommendedResources
      tags: [resources]
      summary: Resources matched to weak topics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Resource" }

  # ---- Public-Q&A scraper ----
  /scraper/jobs:
    get:
      operationId: listScrapeJobs
      tags: [scraper]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScrapeJob" }
    post:
      operationId: createScrapeJob
      tags: [scraper]
      summary: Submit a public, allow-listed URL for question import
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScrapeJobInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScrapeJob" }
  /scraper/jobs/{id}:
    get:
      operationId: getScrapeJob
      tags: [scraper]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScrapeJob" }
        "404": { $ref: "#/components/responses/NotFound" }
  /scraper/allowlist:
    get:
      operationId: getScraperAllowlist
      tags: [scraper]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

  # ---- Dashboard / Plan ----
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
  /dashboard/topic-mastery:
    get:
      operationId: getDashboardTopicMastery
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopicMasteryEntry" }
  /dashboard/topic-history:
    get:
      operationId: getDashboardTopicHistory
      tags: [dashboard]
      summary: Full per-topic attempt history (timestamps + correct flags)
      parameters:
        - name: topicIds
          in: query
          required: false
          description: "Comma-separated topic IDs to filter (omit for all)."
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopicHistoryEntry" }
  /plan/today:
    get:
      operationId: getStudyPlanToday
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyPlan" }
  /plan/regenerate:
    post:
      operationId: regenerateStudyPlan
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyPlan" }
  /plan/fix-it/streak:
    get:
      operationId: getFixItStreak
      tags: [plan]
      summary: Returns the user's fix-it plan completion dates and current streak
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FixItStreak" }
  /plan/fix-it/complete:
    post:
      operationId: markFixItComplete
      tags: [plan]
      summary: Record that the fix-it plan was completed today (server time, idempotent per session+date)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FixItStreak" }

components:
  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
  schemas:
    HealthStatus:
      type: object
      properties: { status: { type: string } }
      required: [status]
    ApiError:
      type: object
      properties: { error: { type: string } }
      required: [error]

    Domain:
      type: object
      required: [id, code, name, weight]
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        weight: { type: number, description: "BOC blueprint % (0-1)" }
    Topic:
      type: object
      required: [id, domainId, name]
      properties:
        id: { type: integer }
        domainId: { type: integer }
        name: { type: string }
