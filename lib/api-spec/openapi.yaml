openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BOC Study Notebook API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: openai
  - name: notebooks
  - name: notes
  - name: resources
  - name: flashcards
  - name: audio
  - name: studyguides
  - name: quizzes
  - name: mock
  - name: tutor
  - name: dashboard
  - name: plan
  - name: scraper
  - name: catalog
  - name: topics
  - name: studygroup
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- Catalog ----
  /domains:
    get:
      operationId: listDomains
      tags: [catalog]
      summary: List BOC domains with target weights
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Domain" }
  /topics:
    get:
      operationId: listTopics
      tags: [catalog]
      summary: List topics
      parameters:
        - { name: domainId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Topic" }

  # ---- Notebooks ----
  /notebooks:
    get:
      operationId: listNotebooks
      tags: [notebooks]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notebook" }
    post:
      operationId: createNotebook
      tags: [notebooks]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotebookInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notebook" }
  /notebooks/{id}:
    get:
      operationId: getNotebook
      tags: [notebooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotebookDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateNotebook
      tags: [notebooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotebookUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notebook" }
    delete:
      operationId: deleteNotebook
      tags: [notebooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---- Notes (sources) ----
  /notebooks/{id}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Note" }
    post:
      operationId: createNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
    delete:
      operationId: deleteNote
      tags: [notes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---- Flashcards ----
  /notebooks/{id}/flashcards:
    get:
      operationId: listFlashcards
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }
    post:
      operationId: createFlashcard
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flashcard" }
  /notebooks/{id}/flashcards/generate:
    post:
      operationId: generateFlashcards
      tags: [flashcards]
      summary: AI-generate flashcards from notebook content
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardGenInput" }
      responses:
        "201":
          description: Generated
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }
  /flashcards/{id}:
    patch:
      operationId: updateFlashcard
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flashcard" }
    delete:
      operationId: deleteFlashcard
      tags: [flashcards]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /flashcards/{id}/choices:
    post:
      operationId: getFlashcardChoices
      tags: [flashcards]
      summary: Generate a 3-option multiple-choice version of this flashcard
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlashcardChoices" }
  /flashcards/{id}/grade:
    post:
      operationId: gradeFlashcardAnswer
      tags: [flashcards]
      summary: Grade a typed free-text answer against the card's back using the AI tutor
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardGradeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlashcardGradeResult" }
  /flashcards/{id}/review:
    post:
      operationId: reviewFlashcard
      tags: [flashcards]
      summary: Submit a spaced-repetition rating (0-5) and get next due
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlashcardReviewInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flashcard" }
  /flashcards:
    get:
      operationId: listAllFlashcards
      tags: [flashcards]
      summary: All flashcards across notebooks (browse / re-study mode)
      parameters:
        - name: source
          in: query
          required: false
          description: Filter by flashcard source (e.g. study_group, manual, ai).
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }
  /flashcards/due:
    get:
      operationId: listDueFlashcards
      tags: [flashcards]
      summary: All flashcards due today across notebooks
      parameters:
        - name: topicIds
          in: query
          required: false
          description: Comma-separated topic IDs to restrict due cards to (used by focused region review).
          schema: { type: string }
        - name: source
          in: query
          required: false
          description: Filter by flashcard source (e.g. study_group).
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flashcard" }

  /questions:
    get:
      operationId: listAllQuestions
      tags: [quizzes]
      summary: All enabled questions in the bank (browse / review surface)
      parameters:
        - name: source
          in: query
          required: false
          description: Filter by question sourceKind (e.g. study_group, manual, ai).
          schema: { type: string }
        - name: pendingReview
          in: query
          required: false
          description: When true, only return questions still flagged pendingReview.
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuestionBankEntry" }

  # ---- Study Guides / Summaries ----
  /notebooks/{id}/study-guides:
    get:
      operationId: listStudyGuides
      tags: [studyguides]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StudyGuide" }
    post:
      operationId: generateStudyGuide
      tags: [studyguides]
      summary: AI-generate a study guide from notebook material
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGuideInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGuide" }
  /study-guides:
    get:
      operationId: listAllStudyGuides
      tags: [studyguides]
      summary: List every study guide across notebooks (with notebook title)
      parameters:
        - { name: notebookId, in: query, required: false, schema: { type: integer } }
        - { name: format, in: query, required: false, schema: { type: string, enum: [outline, summary, qa, mindmap] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StudyGuideListItem" }
  /study-guides/{id}:
    get:
      operationId: getStudyGuide
      tags: [studyguides]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGuideListItem" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteStudyGuide
      tags: [studyguides]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /study-guides/{id}/audio-overviews:
    get:
      operationId: listStudyGuideAudioOverviews
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AudioOverview" }
    post:
      operationId: generateStudyGuideAudioOverview
      tags: [audio]
      summary: AI-generate a two-host podcast audio narration of a study guide
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGuideAudioInput" }
      responses:
        "202":
          description: Accepted; generation started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioOverview" }

  # ---- Audio Overviews (TTS) ----
  /notebooks/{id}/audio-overviews:
    get:
      operationId: listAudioOverviews
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AudioOverview" }
    post:
      operationId: generateAudioOverview
      tags: [audio]
      summary: AI-generate a narrated audio overview of notebook material
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AudioOverviewInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioOverview" }
  /audio-overviews/{id}:
    get:
      operationId: getAudioOverview
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioOverview" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteAudioOverview
      tags: [audio]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /audio-overviews/{id}/audio:
    get:
      operationId: streamAudioOverview
      tags: [audio]
      summary: Stream audio file
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: MP3 audio
          content:
            audio/mpeg: {}

  # ---- Quizzes (adaptive practice) ----
  /quizzes:
    get:
      operationId: listQuizAttempts
      tags: [quizzes]
      summary: Recent practice quiz attempts
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuizSummary" }
    post:
      operationId: startQuiz
      tags: [quizzes]
      summary: Start a practice quiz session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuizInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }
  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /quizzes/{id}/answer:
    post:
      operationId: answerQuizQuestion
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuizAnswerInput" }
      responses:
        "200":
          description: OK with feedback
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizAnswerResult" }
  /quizzes/{id}/finish:
    post:
      operationId: finishQuiz
      tags: [quizzes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }

  # ---- Mock exam ----
  /mock-exams:
    get:
      operationId: listMockExams
      tags: [mock]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MockExamSummary" }
    post:
      operationId: startMockExam
      tags: [mock]
      summary: Start a strict timed mock exam (BOC blueprint, no back-nav, auto-submit)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MockExamInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExam" }
  /mock-exams/{id}:
    get:
      operationId: getMockExam
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExam" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteMockExam
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /mock-exams/{id}/answer:
    post:
      operationId: answerMockExamQuestion
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MockExamAnswerInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExam" }
  /mock-exams/{id}/heartbeat:
    post:
      operationId: heartbeatMockExam
      tags: [mock]
      summary: Visibility/focus heartbeat for proctor-style logging
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MockExamHeartbeatInput" }
      responses:
        "204": { description: OK }
  /mock-exams/{id}/submit:
    post:
      operationId: submitMockExam
      tags: [mock]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockExamResult" }

  # ---- AI Tutor (text streaming) ----
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OpenaiConversation" }
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenaiConversationInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpenaiConversation" }
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpenaiConversationWithMessages" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OpenaiMessage" }
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send tutor message; SSE stream of response chunks
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenaiMessageInput" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  # ---- Resources library ----
  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: Curated study resources (filtered by topic/domain)
      parameters:
        - { name: topicId, in: query, required: false, schema: { type: integer } }
        - { name: domainId, in: query, required: false, schema: { type: integer } }
        - { name: kind, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Resource" }
    post:
      operationId: createResource
      tags: [resources]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResourceInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Resource" }
  /resources/{id}:
    delete:
      operationId: deleteResource
      tags: [resources]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /resources/recommended:
    get:
      operationId: listRecommendedResources
      tags: [resources]
      summary: Resources matched to weak topics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Resource" }

  # ---- Public-Q&A scraper ----
  /scraper/jobs:
    get:
      operationId: listScrapeJobs
      tags: [scraper]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScrapeJob" }
    post:
      operationId: createScrapeJob
      tags: [scraper]
      summary: Submit a public, allow-listed URL for question import
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScrapeJobInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScrapeJob" }
  /scraper/jobs/{id}:
    get:
      operationId: getScrapeJob
      tags: [scraper]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScrapeJob" }
        "404": { $ref: "#/components/responses/NotFound" }
  /scraper/allowlist:
    get:
      operationId: getScraperAllowlist
      tags: [scraper]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

  # ---- Dashboard / Plan ----
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
  /dashboard/topic-mastery:
    get:
      operationId: getDashboardTopicMastery
      tags: [dashboard]
      parameters:
        - name: limit
          in: query
          required: false
          description: "Max number of recent attempts returned per topic (1–20, default 5)."
          schema: { type: integer, minimum: 1, maximum: 20, default: 5 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopicMasteryEntry" }
  /dashboard/topic-history:
    get:
      operationId: getDashboardTopicHistory
      tags: [dashboard]
      summary: Full per-topic attempt history (timestamps + correct flags)
      parameters:
        - name: topicIds
          in: query
          required: false
          description: "Comma-separated topic IDs to filter (omit for all)."
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopicHistoryEntry" }
  /plan/today:
    get:
      operationId: getStudyPlanToday
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyPlan" }
  /plan/regenerate:
    post:
      operationId: regenerateStudyPlan
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyPlan" }
  /plan/today/completions:
    get:
      operationId: getStudyPlanCompletions
      tags: [plan]
      summary: Returns the set of plan-item keys completed today for this session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanCompletions" }
  /plan/today/complete:
    post:
      operationId: markPlanItemComplete
      tags: [plan]
      summary: Mark a today plan item complete by key (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanCompletionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanCompletions" }
  /games/sessions:
    get:
      operationId: listGameSessions
      tags: [games]
      summary: Recent matching-game sessions for this user
      parameters:
        - { name: gameId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GameSession" }
    post:
      operationId: createGameSession
      tags: [games]
      summary: Persist a completed matching-game round
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameSessionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameSession" }
  /games/summary:
    get:
      operationId: getGamesSummary
      tags: [games]
      summary: Per-game best/last-score summary for this user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GameSummaryEntry" }
  /topics/{id}/podcasts:
    post:
      operationId: generateTopicPodcast
      tags: [topics, audio]
      summary: Generate a 5-minute podcast on a single topic for the Weak Topics quick-action.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TopicPodcastInput" }
      responses:
        "202":
          description: Accepted; generation started in the background.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioOverview" }
  /plan/fix-it/streak:
    get:
      operationId: getFixItStreak
      tags: [plan]
      summary: Returns the user's fix-it plan completion dates and current streak
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FixItStreak" }
  /plan/fix-it/complete:
    post:
      operationId: markFixItComplete
      tags: [plan]
      summary: Record that the fix-it plan was completed today (server time, idempotent per session+date)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FixItStreak" }

  # ---- Study Group (multi-agent) ----
  /study-group/sessions:
    get:
      operationId: listStudyGroupSessions
      tags: [studygroup]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StudyGroupSession" }
    post:
      operationId: createStudyGroupSession
      tags: [studygroup]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGroupSessionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGroupSession" }
  /study-group/sessions/{id}:
    get:
      operationId: getStudyGroupSession
      tags: [studygroup]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGroupSessionDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateStudyGroupSession
      tags: [studygroup]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGroupSessionStatusInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGroupSession" }
    delete:
      operationId: deleteStudyGroupSession
      tags: [studygroup]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /study-group/sessions/{id}/round:
    post:
      operationId: runStudyGroupRound
      tags: [studygroup]
      summary: Stream the next study-group round (SSE) — resumes any unfinished round
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGroupRoundInput" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}
  /study-group/sessions/{id}/interject:
    post:
      operationId: interjectStudyGroup
      tags: [studygroup]
      summary: User interjection — agents respond (SSE)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudyGroupInterjectInput" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}
  /study-group/artifacts/{id}/promote:
    post:
      operationId: promoteStudyGroupArtifact
      tags: [studygroup]
      summary: Promote a candidate artifact (flashcard or question) into the main pipeline.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "201":
          description: Promoted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGroupPromoteResult" }
        "409":
          description: Already promoted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /study-group/library:
    get:
      operationId: getStudyGroupLibrary
      tags: [studygroup]
      summary: Feed of every artifact saved from study-group sessions (promoted flashcards + questions, plus pending review state).
      parameters:
        - name: pendingReview
          in: query
          required: false
          description: When true, only return questions still flagged pendingReview.
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGroupLibrary" }
  /study-group/learning-signal:
    get:
      operationId: getStudyGroupLearningSignal
      tags: [studygroup]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyGroupLearningSignal" }

  /ai-learning/overview:
    get:
      operationId: getAiLearningOverview
      tags: [ailearning]
      summary: Bundled view of AI conversations, training output, and quiz accuracy
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiLearningOverview" }

components:
  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
  schemas:
    HealthStatus:
      type: object
      properties: { status: { type: string } }
      required: [status]
    ApiError:
      type: object
      properties: { error: { type: string } }
      required: [error]

    Domain:
      type: object
      required: [id, code, name, weight]
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        weight: { type: number, description: "BOC blueprint % (0-1)" }
    Topic:
      type: object
      required: [id, domainId, name]
      properties:
        id: { type: integer }
        domainId: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }

    Notebook:
      type: object
      required: [id, title, createdAt, updatedAt, noteCount, flashcardCount]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        noteCount: { type: integer }
        flashcardCount: { type: integer }
    NotebookDetail:
      type: object
      required: [id, title, createdAt, updatedAt, notes, flashcards, studyGuides, audioOverviews]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        notes:
          type: array
          items: { $ref: "#/components/schemas/Note" }
        flashcards:
          type: array
          items: { $ref: "#/components/schemas/Flashcard" }
        studyGuides:
          type: array
          items: { $ref: "#/components/schemas/StudyGuide" }
        audioOverviews:
          type: array
          items: { $ref: "#/components/schemas/AudioOverview" }
    NotebookInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
    NotebookUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }

    Note:
      type: object
      required: [id, notebookId, title, content, sourceKind, createdAt]
      properties:
        id: { type: integer }
        notebookId: { type: integer }
        title: { type: string }
        content: { type: string }
        sourceKind:
          type: string
          enum: [text, paste, url, pdf]
        sourceUrl: { type: ["string", "null"] }
        topicId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
    NoteInput:
      type: object
      required: [title, content]
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        sourceKind:
          type: string
          enum: [text, paste, url, pdf]
        sourceUrl: { type: string }
        topicId: { type: integer }
    NoteUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        topicId: { type: integer }

    Flashcard:
      type: object
      required: [id, notebookId, front, back, source, easeFactor, intervalDays, repetitions, dueAt, createdAt]
      properties:
        id: { type: integer }
        notebookId: { type: integer }
        front: { type: string }
        back: { type: string }
        topicId: { type: ["integer", "null"] }
        source: { type: string, description: "How this card was created (manual, ai, study_group, …)" }
        easeFactor: { type: number }
        intervalDays: { type: integer }
        repetitions: { type: integer }
        dueAt: { type: string, format: date-time }
        lastReviewedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    FlashcardInput:
      type: object
      required: [front, back]
      properties:
        front: { type: string, minLength: 1 }
        back: { type: string, minLength: 1 }
        topicId: { type: integer }
    FlashcardUpdate:
      type: object
      properties:
        front: { type: string, minLength: 1 }
        back: { type: string, minLength: 1 }
        topicId: { type: integer }
    FlashcardGenInput:
      type: object
      properties:
        count: { type: integer, default: 10, minimum: 1, maximum: 30 }
        focus: { type: string, description: "Optional topic/concept focus" }
        topicId:
          type: integer
          description: "If set, all generated cards are locked to this topic. Otherwise each card is auto-tagged by the model from the available topics."
    FlashcardChoices:
      type: object
      required: [choices, correctIndex, back]
      properties:
        choices:
          type: array
          items: { type: string }
          minItems: 3
          maxItems: 3
        correctIndex: { type: integer, minimum: 0, maximum: 2 }
        back: { type: string, description: "Full original answer for the reveal step." }
    FlashcardGradeInput:
      type: object
      required: [answer]
      properties:
        answer: { type: string, description: "Free-text answer typed by the student" }
    FlashcardGradeResult:
      type: object
      required: [verdict, score, feedback, suggestedQuality, back]
      properties:
        verdict:
          type: string
          enum: [correct, partial, wrong]
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: "How close the typed answer is to the official back, 0-100."
        feedback: { type: string, description: "Markdown tutor feedback explaining what was right/wrong." }
        suggestedQuality:
          type: integer
          enum: [1, 3, 4, 5]
          description: "Suggested SM-2 rating to pre-select (1=Again, 3=Hard, 4=Good, 5=Easy)."
        back: { type: string, description: "Official answer (back of the card), echoed for convenience." }
    FlashcardReviewInput:
      type: object
      required: [quality]
      properties:
        quality:
          type: integer
          minimum: 0
          maximum: 5
          description: "SM-2 quality rating"

    StudyGuide:
      type: object
      required: [id, notebookId, title, format, content, createdAt]
      properties:
        id: { type: integer }
        notebookId: { type: integer }
        title: { type: string }
        format:
          type: string
          enum: [outline, summary, qa, mindmap]
        content: { type: string, description: "Markdown" }
        createdAt: { type: string, format: date-time }
    StudyGuideListItem:
      type: object
      required: [id, notebookId, notebookTitle, title, format, content, createdAt]
      properties:
        id: { type: integer }
        notebookId: { type: integer }
        notebookTitle: { type: string }
        title: { type: string }
        format:
          type: string
          enum: [outline, summary, qa, mindmap]
        content: { type: string, description: "Markdown" }
        createdAt: { type: string, format: date-time }
    StudyGuideInput:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [outline, summary, qa, mindmap]
        focus: { type: string }

    AudioOverview:
      type: object
      required: [id, notebookId, title, status, voice, createdAt]
      properties:
        id: { type: integer }
        notebookId: { type: integer }
        studyGuideId: { type: ["integer", "null"] }
        title: { type: string }
        status:
          type: string
          enum: [pending, ready, failed]
        voice: { type: string }
        durationSec: { type: ["integer", "null"] }
        transcript: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    AudioOverviewInput:
      type: object
      properties:
        voice:
          type: string
          enum: [alloy, echo, fable, onyx, nova, shimmer]
          default: nova
        style:
          type: string
          enum: [lecture, podcast, quickrecap]
          default: lecture
        focus: { type: string }
    TopicPodcastInput:
      type: object
      properties:
        voice:
          type: string
          enum: [alloy, echo, fable, onyx, nova, shimmer]
          default: nova
    StudyGuideAudioInput:
      type: object
      properties:
        voice:
          type: string
          enum: [alloy, echo, fable, onyx, nova, shimmer]
          default: nova
        focus: { type: string }

    QuizSummary:
      type: object
      required: [id, mode, totalQuestions, correctCount, finishedAt]
      properties:
        id: { type: integer }
        mode: { type: string, enum: [adaptive, topic, domain, weakness] }
        totalQuestions: { type: integer }
        correctCount: { type: integer }
        finishedAt: { type: ["string", "null"], format: date-time }
    Quiz:
      type: object
      required: [id, mode, questions, currentIndex, finished]
      properties:
        id: { type: integer }
        mode: { type: string, enum: [adaptive, topic, domain, weakness] }
        notebookId: { type: ["integer", "null"] }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        questions:
          type: array
          items: { $ref: "#/components/schemas/QuizQuestion" }
        currentIndex: { type: integer }
        finished: { type: boolean }
        score: { type: ["number", "null"] }
    QuizQuestion:
      type: object
      required: [id, questionId, stem, choices]
      properties:
        id: { type: integer }
        questionId: { type: integer }
        stem: { type: string }
        choices:
          type: array
          items: { type: string }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        sourceKind: { type: ["string", "null"] }
        pendingReview: { type: boolean }
        multiSelect: { type: boolean }
        selectedIndex: { type: ["integer", "null"] }
        selectedIndices:
          type: array
          items: { type: integer }
        correctIndex: { type: ["integer", "null"] }
        correctIndices:
          type: array
          items: { type: integer }
        rationale: { type: ["string", "null"] }
        sourceUrl: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
    QuestionBankEntry:
      type: object
      required: [id, stem, sourceKind, pendingReview, createdAt]
      properties:
        id: { type: integer }
        stem: { type: string }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        sourceKind: { type: string }
        pendingReview: { type: boolean }
        createdAt: { type: string, format: date-time }
    QuizInput:
      type: object
      required: [mode, count]
      properties:
        mode: { type: string, enum: [adaptive, topic, domain, weakness, region] }
        count: { type: integer, minimum: 1, maximum: 50 }
        notebookId: { type: integer }
        topicId: { type: integer }
        topicIds:
          type: array
          items: { type: integer }
        domainId: { type: integer }
        sourceKind:
          type: string
          enum: [study_group, ai, manual]
          description: "Filter the question pool by where the question came from."
        pendingReviewOnly:
          type: boolean
          description: "Only include questions still flagged pendingReview (admin/review surface)."
    QuizAnswerInput:
      type: object
      required: [questionId]
      properties:
        selectedIndices:
          type: array
          items: { type: integer }
        questionId: { type: integer }
        selectedIndex: { type: integer, minimum: 0 }
    QuizAnswerResult:
      type: object
      required: [correct, correctIndex, rationale]
      properties:
        correct: { type: boolean }
        correctIndex: { type: integer }
        rationale: { type: string }
        sourceUrl: { type: ["string", "null"] }

    MockExam:
      type: object
      required: [id, totalQuestions, currentIndex, timeLimitSec, startedAt, submitted, autoSubmitted, questions]
      properties:
        id: { type: integer }
        totalQuestions: { type: integer }
        currentIndex: { type: integer }
        timeLimitSec: { type: integer }
        startedAt: { type: string, format: date-time }
        submittedAt: { type: ["string", "null"], format: date-time }
        submitted: { type: boolean }
        autoSubmitted: { type: boolean }
        visibilityBreaks: { type: integer }
        questions:
          type: array
          items: { $ref: "#/components/schemas/MockExamQuestion" }
    MockExamQuestion:
      type: object
      required: [index, stem, choices]
      properties:
        index: { type: integer }
        stem: { type: string }
        choices:
          type: array
          items: { type: string }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        multiSelect: { type: boolean }
        selectedIndex: { type: ["integer", "null"] }
        selectedIndices:
          type: array
          items: { type: integer }
        correctIndex: { type: ["integer", "null"] }
        correctIndices:
          type: array
          items: { type: integer }
        rationale: { type: ["string", "null"] }
        sourceUrl: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
    MockExamSummary:
      type: object
      required: [id, totalQuestions, startedAt, submitted]
      properties:
        id: { type: integer }
        totalQuestions: { type: integer }
        startedAt: { type: string, format: date-time }
        submittedAt: { type: ["string", "null"], format: date-time }
        submitted: { type: boolean }
        scorePercent: { type: ["number", "null"] }
    MockExamInput:
      type: object
      properties:
        totalQuestions: { type: integer, default: 175, minimum: 10, maximum: 200 }
        timeLimitSec: { type: integer, default: 14400 }
    MockExamAnswerInput:
      type: object
      required: [index]
      properties:
        index: { type: integer, minimum: 0 }
        selectedIndex: { type: integer, minimum: 0 }
        selectedIndices:
          type: array
          items: { type: integer }
    MockExamHeartbeatInput:
      type: object
      required: [event]
      properties:
        event: { type: string, enum: [tick, blur, focus, hidden, visible] }
    MockExamResult:
      type: object
      required: [examId, scorePercent, passed, domainBreakdown, weakTopics]
      properties:
        examId: { type: integer }
        scorePercent: { type: number }
        passed: { type: boolean }
        domainBreakdown:
          type: array
          items: { $ref: "#/components/schemas/DomainScore" }
        weakTopics:
          type: array
          items: { $ref: "#/components/schemas/TopicScore" }
    DomainScore:
      type: object
      required: [domainId, code, name, correct, total]
      properties:
        domainId: { type: integer }
        code: { type: string }
        name: { type: string }
        correct: { type: integer }
        total: { type: integer }
    TopicScore:
      type: object
      required: [topicId, name, mastery]
      properties:
        topicId: { type: integer }
        name: { type: string }
        mastery: { type: number }
    TopicMasteryEntry:
      type: object
      required: [topicId, name, mastery, attempts, correct, recentAttempts]
      properties:
        topicId: { type: integer }
        name: { type: string }
        mastery: { type: number, description: "0..1 fraction correct" }
        attempts: { type: integer }
        correct: { type: integer }
        recentAttempts:
          type: array
          description: "Up to the last 5 quiz answers for this topic, oldest first."
          items: { $ref: "#/components/schemas/RecentAttempt" }
    RecentAttempt:
      type: object
      required: [correct, answeredAt, quizId, questionId]
      properties:
        correct: { type: boolean }
        answeredAt: { type: string, format: date-time }
        quizId: { type: integer, description: "Quiz attempt ID this answer belonged to." }
        questionId: { type: integer, description: "Question ID that was answered, used to deep-link reviews." }
    TopicHistoryEntry:
      type: object
      required: [topicId, attempts]
      properties:
        topicId: { type: integer }
        attempts:
          type: array
          description: "All quiz answers for this topic, oldest first."
          items: { $ref: "#/components/schemas/RecentAttempt" }

    OpenaiConversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        notebookId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
    OpenaiConversationInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
        notebookId: { type: integer }
    OpenaiMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        role: { type: string }
        content: { type: string }
        followups:
          type: ["array", "null"]
          items: { type: string }
        createdAt: { type: string, format: date-time }
    OpenaiMessageInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
    OpenaiConversationWithMessages:
      type: object
      required: [id, title, createdAt, messages]
      properties:
        id: { type: integer }
        title: { type: string }
        notebookId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
        messages:
          type: array
          items: { $ref: "#/components/schemas/OpenaiMessage" }

    Resource:
      type: object
      required: [id, title, url, kind, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        url: { type: string }
        kind: { type: string, enum: [article, video, podcast, book, paper, guideline, other] }
        provider: { type: ["string", "null"] }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        saved: { type: boolean }
        createdAt: { type: string, format: date-time }
    ResourceInput:
      type: object
      required: [title, url, kind]
      properties:
        title: { type: string, minLength: 1 }
        url: { type: string, format: uri }
        kind: { type: string, enum: [article, video, podcast, book, paper, guideline, other] }
        provider: { type: string }
        topicId: { type: integer }
        domainId: { type: integer }
        notes: { type: string }

    ScrapeJob:
      type: object
      required: [id, url, status, createdAt]
      properties:
        id: { type: integer }
        url: { type: string }
        status: { type: string, enum: [pending, running, complete, blocked, failed] }
        sourceHost: { type: ["string", "null"] }
        importedCount: { type: integer, default: 0 }
        pendingReviewCount: { type: integer, default: 0 }
        message: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
    ScrapeJobInput:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }

    DashboardSummary:
      type: object
      required: [readinessScore, readinessBaseScore, readinessBonus, lastUpdated, totalQuestionsAnswered, totalCorrect, streakDays, dueFlashcards, recentQuizzes, weakTopics, domainMastery, domainFlashcardCounts, studyGuides, games, continueLearning]
      properties:
        readinessScore: { type: number, description: "0-100 estimate of BOC readiness (includes 7-day activity bonus)" }
        readinessBaseScore: { type: number, description: "Readiness from mastery + last mock exam, before activity bonus." }
        readinessBonus: { type: number, description: "Bonus points (0-10) for guides/podcasts/games in the last 7 days." }
        lastUpdated: { type: string, format: date-time }
        totalQuestionsAnswered: { type: integer }
        totalCorrect: { type: integer }
        streakDays: { type: integer }
        dueFlashcards: { type: integer }
        nextMockEta: { type: ["string", "null"] }
        recentQuizzes:
          type: array
          items: { $ref: "#/components/schemas/QuizSummary" }
        weakTopics:
          type: array
          items: { $ref: "#/components/schemas/TopicScore" }
        domainMastery:
          type: array
          items: { $ref: "#/components/schemas/DomainScore" }
        domainFlashcardCounts:
          type: array
          description: "Flashcard totals (and how many are due now) for each domain, by domain id."
          items: { $ref: "#/components/schemas/DomainFlashcardCount" }
        studyGuides: { $ref: "#/components/schemas/StudyGuidesSummary" }
        games: { $ref: "#/components/schemas/GamesActivitySummary" }
        continueLearning:
          type: array
          description: "Most recently touched learning items across notes, study guides, podcasts, and games."
          items: { $ref: "#/components/schemas/ContinueLearningItem" }
    StudyGuidesSummary:
      type: object
      required: [total, withPodcast, recent7d]
      properties:
        total: { type: integer, description: "Lifetime number of generated study guides." }
        withPodcast: { type: integer, description: "Study guides that have at least one ready podcast." }
        recent7d: { type: integer, description: "Study guides created in the last 7 days." }
    GamesActivitySummary:
      type: object
      required: [lifetime, today, recent7d]
      properties:
        lifetime: { type: integer, description: "All-time game sessions for this user." }
        today: { type: integer, description: "Game sessions completed today." }
        recent7d: { type: integer, description: "Game sessions completed in the last 7 days." }
    ContinueLearningItem:
      type: object
      required: [kind, title, link, lastTouchedAt]
      properties:
        kind:
          type: string
          enum: [note, study_guide, podcast, game]
        title: { type: string }
        subtitle: { type: ["string", "null"], description: "Optional context, e.g. notebook title or game id." }
        link: { type: string, description: "App-relative path to deep-link the user back into the activity." }
        lastTouchedAt: { type: string, format: date-time }
    DomainFlashcardCount:
      type: object
      required: [domainId, total, due]
      properties:
        domainId: { type: integer }
        total: { type: integer }
        due: { type: integer }

    StudyPlan:
      type: object
      required:
        [date, items, mandatoryCount, completedMandatoryCount, completedCount, dayComplete]
      properties:
        date: { type: string, format: date }
        items:
          type: array
          items: { $ref: "#/components/schemas/StudyPlanItem" }
        mandatoryCount: { type: integer, description: "Number of mandatory items in today's plan." }
        completedMandatoryCount: { type: integer, description: "Mandatory items completed so far today." }
        completedCount: { type: integer, description: "Total items (mandatory or not) completed today." }
        dayComplete: { type: boolean, description: "True when every mandatory item is complete." }
    StudyPlanItem:
      type: object
      required: [kind, title, estMinutes, key, mandatory, completed]
      properties:
        kind:
          type: string
          enum:
            [quiz, flashcards, review, audio, study_guide, resource, game, mock_exam, rest]
        title: { type: string }
        description: { type: ["string", "null"] }
        estMinutes: { type: integer }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        notebookId: { type: ["integer", "null"] }
        gameId: { type: ["string", "null"] }
        link: { type: ["string", "null"] }
        key: { type: string, description: "Stable identifier for this item, used to record completion." }
        mandatory: { type: boolean, description: "If true, this item must be completed for the day to count as complete." }
        completed: { type: boolean, description: "True when this item has been marked complete today." }
        carriedFrom:
          type: ["string", "null"]
          format: date
          description: "Original date (YYYY-MM-DD) this item was scheduled for, if it was rolled over from a previous day."

    PlanCompletions:
      type: object
      required: [date, completedKeys]
      properties:
        date: { type: string, format: date }
        completedKeys:
          type: array
          items: { type: string }
    PlanCompletionInput:
      type: object
      required: [itemKey]
      properties:
        itemKey: { type: string }

    GameSessionInput:
      type: object
      required: [gameId, score, totalPairs]
      properties:
        gameId: { type: string }
        score: { type: integer, minimum: 0 }
        totalPairs: { type: integer, minimum: 0 }
        misses: { type: integer, minimum: 0 }
        bestStreak: { type: integer, minimum: 0 }
        durationMs: { type: integer, minimum: 0 }
    GameSession:
      type: object
      required: [id, sessionId, gameId, score, totalPairs, misses, bestStreak, durationMs, completedAt]
      properties:
        id: { type: integer }
        sessionId: { type: string }
        gameId: { type: string }
        score: { type: integer }
        totalPairs: { type: integer }
        misses: { type: integer }
        bestStreak: { type: integer }
        durationMs: { type: integer }
        completedAt: { type: string, format: date-time }
    GameSummaryEntry:
      type: object
      required: [gameId, plays, bestScore, lastScore, lastPlayedAt]
      properties:
        gameId: { type: string }
        plays: { type: integer }
        bestScore: { type: integer }
        lastScore: { type: integer }
        lastPlayedAt: { type: string, format: date-time }

    FixItStreak:
      type: object
      required: [completedDates, streak, completedToday, today]
      properties:
        completedDates:
          type: array
          items: { type: string, format: date }
        streak: { type: integer }
        completedToday: { type: boolean }
        today: { type: string, format: date }

    StudyGroupSession:
      type: object
      required: [id, title, status, roundCount, createdAt, updatedAt]
      properties:
        id: { type: integer }
        title: { type: string }
        topicId: { type: ["integer", "null"] }
        domainId: { type: ["integer", "null"] }
        focus: { type: ["string", "null"] }
        status: { type: string, enum: [idle, active, paused, finished] }
        roundCount: { type: integer }
        pendingExtractionRound:
          type: ["integer", "null"]
          description: "If set, the named round has all turns done but its artifact extraction has not yet completed."
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    StudyGroupRoundInput:
      type: object
      properties:
        retry:
          type: boolean
          description: "If true, reset any 'failed' turns in the latest unfinished round to 'pending' and re-run them."
    StudyGroupSessionInput:
      type: object
      properties:
        topicId: { type: integer, description: "Optional. Auto-picks the weakest topic if omitted." }
        focus: { type: string, description: "Optional focus prompt the user wants the group to anchor on." }
    StudyGroupSessionStatusInput:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, paused, finished] }
    StudyGroupMessage:
      type: object
      required: [id, sessionId, speaker, kind, content, roundIndex, createdAt, status, turnOrder]
      properties:
        id: { type: integer }
        sessionId: { type: integer }
        speaker: { type: string, enum: [mentor, alex, jordan, student, system] }
        kind: { type: string, description: "question | answer | reasoning | verdict | takeaway | interjection | response | system" }
        content: { type: string }
        roundIndex: { type: integer }
        questionId: { type: ["integer", "null"] }
        status:
          type: string
          enum: [pending, streaming, done, failed]
          description: "Per-turn checkpoint. Non-'done' turns in the latest round can be resumed."
        reason:
          type: ["string", "null"]
          description: "Why this turn ended in its current state. 'sweeper_timeout' means the periodic sweeper or startup recovery flipped a stuck 'streaming' row to 'failed' because it took too long. NULL for normal failures and successes."
        turnOrder: { type: integer, description: "0-based order within the round for planned turns." }
        createdAt: { type: string, format: date-time }
    StudyGroupArtifact:
      type: object
      required: [id, sessionId, roundIndex, kind, payload, createdAt]
      properties:
        id: { type: integer }
        sessionId: { type: integer }
        roundIndex: { type: integer }
        kind: { type: string, enum: [flashcard_candidate, question_candidate, reasoning_pattern, mastery_signal] }
        topicId: { type: ["integer", "null"] }
        payload:
          type: object
          additionalProperties: true
        promotedRefId: { type: ["integer", "null"] }
        promotedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    StudyGroupSessionDetail:
      type: object
      required: [session, messages, artifacts]
      properties:
        session: { $ref: "#/components/schemas/StudyGroupSession" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/StudyGroupMessage" }
        artifacts:
          type: array
          items: { $ref: "#/components/schemas/StudyGroupArtifact" }
    StudyGroupInterjectInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
    StudyGroupPromoteResult:
      type: object
      required: [kind, id]
      properties:
        kind: { type: string, enum: [flashcard, question] }
        id: { type: integer }
    StudyGroupLearningSignalNote:
      type: object
      required: [note]
      properties:
        note: { type: string }
        topic: { type: ["string", "null"] }
    StudyGroupLibraryFlashcard:
      type: object
      required: [artifactId, flashcardId, sessionId, sessionTitle, roundIndex, front, back, createdAt]
      properties:
        artifactId: { type: integer }
        flashcardId: { type: integer }
        sessionId: { type: integer }
        sessionTitle: { type: string }
        roundIndex: { type: integer }
        topicId: { type: ["integer", "null"] }
        topicName: { type: ["string", "null"] }
        front: { type: string }
        back: { type: string }
        createdAt: { type: string, format: date-time }
        promotedAt: { type: ["string", "null"], format: date-time }
    StudyGroupLibraryQuestion:
      type: object
      required: [artifactId, questionId, sessionId, sessionTitle, roundIndex, stem, choices, correctIndex, pendingReview, createdAt]
      properties:
        artifactId: { type: integer }
        questionId: { type: integer }
        sessionId: { type: integer }
        sessionTitle: { type: string }
        roundIndex: { type: integer }
        topicId: { type: ["integer", "null"] }
        topicName: { type: ["string", "null"] }
        stem: { type: string }
        choices:
          type: array
          items: { type: string }
        correctIndex: { type: integer }
        rationale: { type: ["string", "null"] }
        pendingReview: { type: boolean }
        createdAt: { type: string, format: date-time }
        promotedAt: { type: ["string", "null"], format: date-time }
    StudyGroupLibrary:
      type: object
      required: [flashcards, questions, pendingReviewCount]
      properties:
        flashcards:
          type: array
          items: { $ref: "#/components/schemas/StudyGroupLibraryFlashcard" }
        questions:
          type: array
          items: { $ref: "#/components/schemas/StudyGroupLibraryQuestion" }
        pendingReviewCount: { type: integer, description: "Promoted study-group questions still flagged pendingReview." }
    StudyGroupLearningSignal:
      type: object
      required:
        [sessions, reasoningPatterns, flashcardCandidates, flashcardsPromoted, questionCandidates, questionsPromoted, masterySignals, summary, recentSignalNotes]
      properties:
        sessions: { type: integer }
        reasoningPatterns: { type: integer }
        flashcardCandidates: { type: integer }
        flashcardsPromoted: { type: integer }
        questionCandidates: { type: integer }
        questionsPromoted: { type: integer }
        masterySignals: { type: integer }
        summary: { type: string }
        recentSignalNotes:
          type: array
          items: { $ref: "#/components/schemas/StudyGroupLearningSignalNote" }

    AiLearningOverview:
      type: object
      required: [conversations, training, accuracy]
      properties:
        conversations:
          type: object
          required: [tutor, studyGroup]
          properties:
            tutor:
              type: object
              required: [totalSessions, totalMessages, recent]
              properties:
                totalSessions: { type: integer }
                totalMessages: { type: integer }
                recent:
                  type: array
                  items: { $ref: "#/components/schemas/AiLearningTutorConv" }
            studyGroup:
              type: object
              required: [totalSessions, totalMessages, recent]
              properties:
                totalSessions: { type: integer }
                totalMessages: { type: integer }
                recent:
                  type: array
                  items: { $ref: "#/components/schemas/AiLearningStudyGroupSession" }
        training:
          type: object
          required: [flashcards, questions, artifacts, recentPromoted]
          properties:
            flashcards:
              type: object
              required: [total, bySource]
              properties:
                total: { type: integer }
                bySource:
                  type: array
                  items:
                    type: object
                    required: [source, count]
                    properties:
                      source: { type: string }
                      count: { type: integer }
            questions:
              type: object
              required: [total, bySource]
              properties:
                total: { type: integer }
                bySource:
                  type: array
                  items:
                    type: object
                    required: [source, count, pendingReview]
                    properties:
                      source: { type: string }
                      count: { type: integer }
                      pendingReview: { type: integer }
            artifacts:
              type: object
              required: [total, promoted, byKind]
              properties:
                total: { type: integer }
                promoted: { type: integer }
                byKind:
                  type: array
                  items:
                    type: object
                    required: [kind, count, promoted]
                    properties:
                      kind: { type: string }
                      count: { type: integer }
                      promoted: { type: integer }
            recentPromoted:
              type: array
              items: { $ref: "#/components/schemas/AiLearningPromotedItem" }
        accuracy:
          type: object
          required: [overall, daily, byDomain]
          properties:
            overall:
              type: object
              required: [attempts, correct]
              properties:
                attempts: { type: integer }
                correct: { type: integer }
                accuracy:
                  type: number
                  nullable: true
            daily:
              type: array
              items: { $ref: "#/components/schemas/AiLearningDailyPoint" }
            byDomain:
              type: array
              items: { $ref: "#/components/schemas/AiLearningDomainAccuracy" }
    AiLearningTutorConv:
      type: object
      required: [id, title, messageCount, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        messageCount: { type: integer }
        lastMessageAt: { type: string, nullable: true, format: date-time }
        createdAt: { type: string, format: date-time }
    AiLearningStudyGroupSession:
      type: object
      required: [id, title, status, roundCount, messageCount, artifactCount, promotedCount, updatedAt]
      properties:
        id: { type: integer }
        title: { type: string }
        status: { type: string }
        roundCount: { type: integer }
        messageCount: { type: integer }
        artifactCount: { type: integer }
        promotedCount: { type: integer }
        updatedAt: { type: string, format: date-time }
    AiLearningPromotedItem:
      type: object
      required: [id, kind, promotedAt, sessionId, sessionTitle, preview]
      properties:
        id: { type: integer }
        kind: { type: string }
        promotedAt: { type: string, format: date-time }
        sessionId: { type: integer }
        sessionTitle: { type: string }
        topicName: { type: string, nullable: true }
        preview:
          type: object
          required: [front, back]
          properties:
            front: { type: string }
            back: { type: string }
    AiLearningDailyPoint:
      type: object
      required: [day, attempts, correct]
      properties:
        day: { type: string, format: date-time }
        attempts: { type: integer }
        correct: { type: integer }
        accuracy: { type: number, nullable: true }
    AiLearningDomainAccuracy:
      type: object
      required: [domainId, domainName, attempts, correct]
      properties:
        domainId: { type: integer }
        domainName: { type: string }
        attempts: { type: integer }
        correct: { type: integer }
        accuracy: { type: number, nullable: true }

